<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>⚔️ 网页1v1格斗游戏</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .screen.active { display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 900px;
      width: 100%;
      text-align: center;
    }
    h1 { color: #667eea; margin-bottom: 20px; font-size: 40px; }
    p { color: #666; margin-bottom: 20px; font-size: 16px; }
    input { 
      padding: 12px; 
      font-size: 16px; 
      border: 2px solid #667eea; 
      border-radius: 8px; 
      margin: 10px auto;
      width: 100%;
      max-width: 400px;
      display: block;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 12px;
      margin: 30px 0;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .hero-btn {
      padding: 12px 8px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: 3px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 13px;
      font-weight: bold;
    }
    .hero-btn:hover { transform: translateY(-5px); }
    .hero-btn.selected { border-color: #ffd700; box-shadow: 0 0 20px rgba(255,215,0,0.6); }
    .btn {
      padding: 12px 30px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin: 10px;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    .btn-primary:hover:not(:disabled) { transform: scale(1.05); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #e74c3c; color: white; }
    .btn-secondary:hover { background: #c0392b; }
    .spinner {
      width: 60px;
      height: 60px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 30px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    canvas { display: block; margin: 0 auto; background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 100%); border: 4px solid #333; border-radius: 10px; max-width: 100%; }
    .game-info { 
      display: flex; 
      justify-content: space-around; 
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 20px;
    }
    .player-info {
      flex: 1;
      min-width: 180px;
      text-align: center;
    }
    .player-name { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
    .health-bar { 
      width: 100%;
      height: 25px; 
      background: #ddd; 
      border-radius: 12px; 
      overflow: hidden; 
      margin: 8px 0;
      border: 2px solid #333;
    }
    .health-fill { 
      height: 100%; 
      background: linear-gradient(90deg, #27ae60, #2ecc71); 
      width: 100%;
      transition: width 0.2s;
    }
    .hp-text { font-size: 12px; color: #666; margin-top: 3px; }
    .skill-info {
      font-size: 12px;
      margin-top: 5px;
      height: 20px;
      color: #667eea;
      font-weight: bold;
    }
    .controls {
      text-align: center;
      margin-top: 15px;
      color: #333;
      font-size: 14px;
    }
  </style>
</head>
<body>

<!-- 大厅 -->
<div id="lobby" class="screen active">
  <div class="container">
    <h1>⚔️ 网页1v1格斗游戏</h1>
    <p>与全球玩家实时对战！</p>
    <input id="playerName" placeholder="输入你的昵称" maxlength="10">
    <p style="margin-top: 30px; font-weight: bold; color: #333;">选择你的英雄：</p>
    <div id="heroList" class="hero-grid"></div>
    <button id="joinBtn" class="btn btn-primary" disabled onclick="joinGame()">进入竞技场</button>
  </div>
</div>

<!-- 等待 -->
<div id="waiting" class="screen">
  <div class="container">
    <h2>🔍 寻找对手中...</h2>
    <div class="spinner"></div>
    <p>等待对手进入房间</p>
    <button class="btn btn-secondary" onclick="cancelQueue()">返回大厅</button>
  </div>
</div>

<!-- 游戏 -->
<div id="battle" class="screen">
  <div class="container" style="padding: 20px;">
    <div class="game-info">
      <div class="player-info">
        <div id="player1Name" class="player-name"></div>
        <div class="health-bar"><div id="health1" class="health-fill"></div></div>
        <div class="hp-text">HP: <span id="hp1">100</span></div>
        <div class="skill-info" id="skill1"></div>
      </div>
      <div style="font-size: 32px; font-weight: bold; color: #e74c3c;">VS</div>
      <div class="player-info">
        <div id="player2Name" class="player-name"></div>
        <div class="health-bar"><div id="health2" class="health-fill"></div></div>
        <div class="hp-text">HP: <span id="hp2">100</span></div>
        <div class="skill-info" id="skill2"></div>
      </div>
    </div>
    <canvas id="gameCanvas" width="900" height="450"></canvas>
    <div class="controls">
      <p><strong>⌨️ 操作说明</strong></p>
      <p>← → 移动 | ↑ 跳跃 | 空格 攻击 | Ctrl 技能</p>
    </div>
    <button class="btn btn-secondary" onclick="surrender()">投降</button>
  </div>
</div>

<!-- 结果 -->
<div id="result" class="screen">
  <div class="container">
    <h2 id="resultTitle" style="font-size: 48px; margin-bottom: 30px;"></h2>
    <p id="resultDetail" style="font-size: 18px; color: #666; margin-bottom: 30px;"></p>
    <button class="btn btn-primary" onclick="location.reload()">重新开始</button>
  </div>
</div>

<script>
// Firebase 初始化
const firebaseConfig = {
  apiKey: "AIzaSyClPWDNsJXUerSS6YGfMsir1H3KAut1gtE",
  authDomain: "game-d7e6d.firebaseapp.com",
  databaseURL: "https://game-d7e6d-default-rtdb.firebaseio.com",
  projectId: "game-d7e6d",
  storageBucket: "game-d7e6d.firebasestorage.app",
  messagingSenderId: "852429976571",
  appId: "1:852429976571:web:9d3a79153361264278915e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 英雄数据
const HEROES = {
  'sword': { name: '⚔️ 剑客', hp: 100, damage: 16, speed: 7, emoji: '🗡️' },
  'knight': { name: '🛡️ 重骑', hp: 140, damage: 12, speed: 5, emoji: '🛡️' },
  'pyro': { name: '🔥 火法', hp: 90, damage: 18, speed: 6, emoji: '🔥' },
  'frost': { name: '❄️ 冰法', hp: 90, damage: 13, speed: 6, emoji: '❄️' },
  'bolt': { name: '⚡ 雷电', hp: 85, damage: 22, speed: 7, emoji: '⚡' },
  'assassin': { name: '🗡️ 刺客', hp: 70, damage: 21, speed: 10, emoji: '🗡️' },
  'druid': { name: '🌿 自然', hp: 110, damage: 11, speed: 5, emoji: '🌿' },
  'beast': { name: '👹 怪兽', hp: 120, damage: 14, speed: 6, emoji: '👹' }
};

// 全局状态
let game = {
  playerName: '',
  selectedHero: 'sword',
  playerNumber: 0,
  roomId: '',
  myHP: 100,
  oppoHP: 100,
  gameActive: false,
  opponentName: '对手',
  mySkillCD: 0,
  oppoSkillCD: 0,
  myX: 150,
  oppoX: 750,
  myY: 300,
  oppoY: 300,
  myVY: 0,
  oppoVY: 0,
  isJumping: false,
  effects: [],
  roomRef: null,
  keys: {}
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 工具
function el(id) { return document.getElementById(id); }
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  el(id).classList.add('active');
}

// 初始化英雄选择
function initHeroes() {
  let html = '';
  for (let [key, hero] of Object.entries(HEROES)) {
    html += `<button class="hero-btn" onclick="selectHero('${key}')" id="hero_${key}">
      ${hero.name}<br><small>HP:${hero.hp} ATK:${hero.damage}</small>
    </button>`;
  }
  el('heroList').innerHTML = html;
  selectHero('sword');
}

function selectHero(key) {
  game.selectedHero = key;
  document.querySelectorAll('.hero-btn').forEach(b => b.classList.remove('selected'));
  el('hero_' + key).classList.add('selected');
  updateJoinBtn();
}

function updateJoinBtn() {
  el('joinBtn').disabled = !el('playerName').value.trim();
}

el('playerName').addEventListener('input', updateJoinBtn);

// 加入游戏
async function joinGame() {
  game.playerName = el('playerName').value.trim();
  if (!game.playerName) { alert('请输入昵称'); return; }
  
  show('waiting');
  
  try {
    const queueRef = db.ref('queue_v2');
    const snap = await queueRef.once('value');
    const queue = snap.val() || [];
    
    if (queue.length > 0) {
      // 加入配对
      const opponent = queue[0];
      game.roomId = opponent.roomId;
      game.playerNumber = 2;
      game.opponentName = opponent.name;
      
      const hero = HEROES[game.selectedHero];
      await db.ref('rooms_v2/' + game.roomId).update({
        player2: {
          name: game.playerName,
          hero: game.selectedHero,
          hp: hero.hp,
          x: 750,
          y: 300
        }
      });
      
      await queueRef.set(queue.slice(1));
      setTimeout(startGame, 1000);
    } else {
      // 创建房间
      game.roomId = '_' + Math.random().toString(36).substr(2, 9);
      game.playerNumber = 1;
      
      const hero = HEROES[game.selectedHero];
      await db.ref('rooms_v2/' + game.roomId).set({
        player1: {
          name: game.playerName,
          hero: game.selectedHero,
          hp: hero.hp,
          x: 150,
          y: 300
        },
        player2: null
      });
      
      await queueRef.set([...queue, {
        roomId: game.roomId,
        name: game.playerName
      }]);
      
      waitOpponent();
    }
  } catch (e) {
    console.error('错误:', e);
    alert('连接失��');
    show('lobby');
  }
}

function waitOpponent() {
  const timeout = setTimeout(() => {
    alert('等待超时');
    cancelQueue();
  }, 120000);
  
  db.ref('rooms_v2/' + game.roomId).on('value', snap => {
    if (snap.val().player2) {
      clearTimeout(timeout);
      game.opponentName = snap.val().player2.name;
      db.ref('rooms_v2/' + game.roomId).off();
      setTimeout(startGame, 500);
    }
  });
}

function cancelQueue() {
  db.ref('queue_v2').once('value', snap => {
    const queue = snap.val() || [];
    db.ref('queue_v2').set(queue.filter(q => q.roomId !== game.roomId));
  });
  show('lobby');
}

// 开始游戏
function startGame() {
  show('battle');
  game.gameActive = true;
  
  const hero = HEROES[game.selectedHero];
  game.myHP = hero.hp;
  game.oppoHP = hero.hp;
  
  const p1 = game.playerNumber === 1 ? game.playerName : game.opponentName;
  const p2 = game.playerNumber === 1 ? game.opponentName : game.playerName;
  
  el('player1Name').textContent = p1 + ' ' + HEROES[game.selectedHero].name;
  el('player2Name').textContent = p2 + ' ' + hero.name;
  
  game.roomRef = db.ref('rooms_v2/' + game.roomId);
  game.roomRef.on('value', syncGame);
  
  document.onkeydown = keyDown;
  document.onkeyup = keyUp;
  
  gameLoop();
}

function keyDown(e) {
  if (!game.gameActive) return;
  game.keys[e.key] = true;
  
  if (e.key === ' ') { e.preventDefault(); attack(); }
  if (e.key === 'Control') { e.preventDefault(); skill(); }
  if (e.key === 'ArrowUp') { e.preventDefault(); jump(); }
}

function keyUp(e) {
  game.keys[e.key] = false;
}

function attack() {
  const hero = HEROES[game.selectedHero];
  game.oppoHP -= hero.damage;
  game.effects.push({ x: game.oppoX, y: game.oppoY - 50, text: '💥', life: 30 });
  checkEnd();
}

function skill() {
  if (game.mySkillCD > 0) return;
  const hero = HEROES[game.selectedHero];
  game.mySkillCD = 8;
  game.oppoHP -= hero.damage * 1.5;
  game.effects.push({ x: game.oppoX, y: game.oppoY - 80, text: '⚡✨', life: 50 });
  checkEnd();
}

function jump() {
  if (!game.isJumping) {
    game.myVY = -15;
    game.isJumping = true;
  }
}

function syncGame(snap) {
  const data = snap.val();
  if (!data) return;
  
  const oppo = game.playerNumber === 1 ? data.player2 : data.player1;
  if (oppo) {
    game.oppoHP = oppo.hp;
    game.oppoX = oppo.x || 750;
    game.oppoY = oppo.y || 300;
  }
}

function gameLoop() {
  if (!game.gameActive) return;
  
  // 移动
  if (game.keys['ArrowLeft']) game.myX -= HEROES[game.selectedHero].speed;
  if (game.keys['ArrowRight']) game.myX += HEROES[game.selectedHero].speed;
  
  game.myX = Math.max(50, Math.min(450, game.myX));
  
  // 重力
  game.myVY += 0.6;
  game.myY += game.myVY;
  
  if (game.myY >= 300) {
    game.myY = 300;
    game.myVY = 0;
    game.isJumping = false;
  }
  
  // 冷却
  if (game.mySkillCD > 0) game.mySkillCD -= 0.016;
  if (game.oppoSkillCD > 0) game.oppoSkillCD -= 0.016;
  
  // 特效
  game.effects = game.effects.filter(e => (e.life--, e.life > 0));
  
  // 更新Firebase
  const hero = HEROES[game.selectedHero];
  const pkey = game.playerNumber === 1 ? 'player1' : 'player2';
  game.roomRef.child(pkey).update({
    x: game.myX,
    y: game.myY,
    hp: game.myHP
  }).catch(e => console.log('更新失败:', e));
  
  updateUI();
  draw();
  
  requestAnimationFrame(gameLoop);
}

function updateUI() {
  const hero = HEROES[game.selectedHero];
  el('health1').style.width = Math.max(0, game.myHP / hero.hp * 100) + '%';
  el('health2').style.width = Math.max(0, game.oppoHP / hero.hp * 100) + '%';
  el('hp1').textContent = Math.max(0, Math.floor(game.myHP));
  el('hp2').textContent = Math.max(0, Math.floor(game.oppoHP));
  
  el('skill1').textContent = game.mySkillCD > 0 ? '冷却: ' + Math.ceil(game.mySkillCD) + 's' : '✓ 就绪';
  el('skill2').textContent = game.oppoSkillCD > 0 ? '冷却中' : '⚠ 就绪';
}

function draw() {
  // 背景
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#87ceeb');
  grad.addColorStop(1, '#e0f6ff');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // 地面
  ctx.fillStyle = '#90EE90';
  ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
  
  // 分界线
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.setLineDash([10, 10]);
  ctx.beginPath();
  ctx.moveTo(canvas.width / 2, 0);
  ctx.lineTo(canvas.width / 2, canvas.height);
  ctx.stroke();
  ctx.setLineDash([]);
  
  // 绘制角色
  drawChar(game.myX, game.myY, HEROES[game.selectedHero], '#3498db');
  drawChar(game.oppoX, game.oppoY, HEROES[game.selectedHero], '#e74c3c');
  
  // 特效
  game.effects.forEach(e => {
    ctx.font = 'bold 40px Arial';
    ctx.fillText(e.text, e.x, e.y);
  });
}

function drawChar(x, y, hero, color) {
  const size = 60;
  ctx.fillStyle = color;
  ctx.fillRect(x - size/2, y - size/2, size, size);
  
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x - 12, y - 10, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 12, y - 10, 10, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(x - 12, y - 10, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 12, y - 10, 5, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.font = 'bold 40px Arial';
  ctx.fillText(hero.emoji, x - 20, y + 25);
}

function checkEnd() {
  if (game.myHP <= 0) endGame(false);
  if (game.oppoHP <= 0) endGame(true);
}

function endGame(win) {
  game.gameActive = false;
  document.onkeydown = null;
  document.onkeyup = null;
  game.roomRef.off();
  
  el('resultTitle').textContent = win ? '🎉 你赢了！' : '😔 你输了';
  el('resultDetail').innerHTML = `<b>${game.playerName}</b> vs <b>${game.opponentName}</b><br>你的血量: ${Math.floor(game.myHP)} | 对手血量: ${Math.floor(game.oppoHP)}`;
  
  show('result');
  
  db.ref('rooms_v2/' + game.roomId).remove();
}

function surrender() {
  endGame(false);
}

// 初始化
initHeroes();
</script>

</body>
</html>
