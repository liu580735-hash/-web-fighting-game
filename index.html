<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>网页1v1格斗游戏 - Firebase实时对战</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Arial', sans-serif;
      min-height: 100vh;
    }
    .screen { display: none; width: 100%; height: 100vh; position: absolute; top: 0; left: 0; }
    .screen.active { display: flex; align-items: center; justify-content: center; }
    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 900px;
    }
    h1, h2 { color: #667eea; margin-bottom: 20px; }
    input {
      padding: 12px;
      font-size: 16px;
      border: 2px solid #667eea;
      border-radius: 8px;
      margin: 10px 0;
      width: 100%;
      max-width: 300px;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin: 20px 0;
    }
    .hero-btn {
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: 3px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    .hero-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }
    .hero-btn.selected {
      border-color: #ffd700;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
    }
    .hero-emoji { font-size: 30px; margin-bottom: 8px; }
    .btn {
      padding: 12px 30px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      margin: 10px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover:not(:disabled) {
      transform: scale(1.05);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #e74c3c;
      color: white;
    }
    .btn-secondary:hover {
      background: #c0392b;
    }
    .spinner {
      width: 60px;
      height: 60px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 30px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #battle-canvas {
      display: block;
      margin: 20px auto;
      background: #ecf0f1;
      border: 3px solid #333;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    .game-info {
      display: flex;
      justify-content: space-around;
      margin: 20px 0;
      font-size: 18px;
    }
    .player-info {
      text-align: left;
    }
    .health-bar {
      width: 250px;
      height: 20px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
      margin: 5px 0;
    }
    .health-fill {
      height: 100%;
      background: linear-gradient(90deg, #e74c3c, #27ae60);
      width: 100%;
      transition: width 0.2s;
    }
    .energy-fill {
      height: 100%;
      background: linear-gradient(90deg, #3498db, #2980b9);
      width: 100%;
      transition: width 0.2s;
    }
    .skill-cd {
      color: #e74c3c;
      font-weight: bold;
      margin-top: 5px;
    }
    .skill-ready {
      color: #27ae60;
      font-weight: bold;
    }
    @media (max-width: 1024px) {
      .hero-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      #battle-canvas {
        max-width: 90vw;
        height: auto;
      }
    }
  </style>
</head>
<body>

<!-- 大厅界面 -->
<div id="lobby" class="screen active">
  <div class="container">
    <h1>⚔️ 网页1v1格斗游戏</h1>
    <p style="color: #666; margin-bottom: 20px;">与全球玩家实时对战！</p>
    
    <div>
      <input id="playerName" placeholder="输入你的昵称" maxlength="10">
    </div>
    
    <p style="color: #333; margin-top: 20px; font-weight: bold;">选择你的英雄：</p>
    <div id="heroList" class="hero-grid"></div>
    
    <button id="joinBtn" class="btn btn-primary" disabled>进入竞技场</button>
  </div>
</div>

<!-- 等待界面 -->
<div id="waiting" class="screen">
  <div class="container">
    <h2>🔍 寻找对手中...</h2>
    <div class="spinner"></div>
    <p style="color: #666; font-size: 18px;">等待对手进入房间</p>
    <button class="btn btn-secondary" onclick="cancelQueue()">返回大厅</button>
  </div>
</div>

<!-- 游戏界面 -->
<div id="battle" class="screen">
  <div class="container" style="max-width: 1000px; padding: 20px;">
    <div class="game-info">
      <div class="player-info">
        <div id="player1Name" style="font-weight: bold; color: #667eea;"></div>
        <div class="health-bar">
          <div id="health1" class="health-fill"></div>
        </div>
        <div style="font-size: 14px; color: #666;">血量: <span id="hp1">100</span></div>
        <div id="skill1" class="skill-cd"></div>
      </div>
      <div style="font-size: 24px; font-weight: bold; color: #e74c3c;">VS</div>
      <div class="player-info">
        <div id="player2Name" style="font-weight: bold; color: #764ba2;"></div>
        <div class="health-bar">
          <div id="health2" class="health-fill"></div>
        </div>
        <div style="font-size: 14px; color: #666;">血量: <span id="hp2">100</span></div>
        <div id="skill2" class="skill-cd"></div>
      </div>
    </div>
    
    <canvas id="battle-canvas" width="1000" height="500"></canvas>
    
    <div style="color: #333; margin-top: 20px; font-size: 16px;">
      <p><strong>操作说明：</strong></p>
      <p>← → 移动 | ↑ 跳跃 | 空格 攻击 | Ctrl 技能</p>
    </div>
    
    <button class="btn btn-secondary" onclick="surrender()">投降</button>
  </div>
</div>

<!-- 结算界面 -->
<div id="result" class="screen">
  <div class="container">
    <h2 id="resultTitle"></h2>
    <div id="resultDetail" style="font-size: 18px; color: #666; margin: 20px 0;"></div>
    <button class="btn btn-primary" onclick="location.reload()">重新开始</button>
  </div>
</div>

<script>
// ========== Firebase 配置 ==========
const firebaseConfig = {
  apiKey: "AIzaSyClPWDNsJXUerSS6YGfMsir1H3KAut1gtE",
  authDomain: "game-d7e6d.firebaseapp.com",
  databaseURL: "https://game-d7e6d-default-rtdb.firebaseio.com",
  projectId: "game-d7e6d",
  storageBucket: "game-d7e6d.firebasestorage.app",
  messagingSenderId: "852429976571",
  appId: "1:852429976571:web:9d3a79153361264278915e",
  measurementId: "G-LPZRHLXGZL"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ========== 英雄定义 ==========
const HEROES = {
  'swordsman': {
    name: '⚔️ 剑客',
    hp: 100,
    damage: 16,
    speed: 7,
    defense: 0.8,
    skill: { name: '三段斩', cooldown: 5, damage: 20 }
  },
  'knight': {
    name: '🛡️ 重骑',
    hp: 140,
    damage: 12,
    speed: 5,
    defense: 1.5,
    skill: { name: '盾墙', cooldown: 6, effect: 'shield' }
  },
  'pyromancer': {
    name: '🔥 火法',
    hp: 90,
    damage: 18,
    speed: 6,
    defense: 0.6,
    skill: { name: '流星火雨', cooldown: 5, damage: 35 }
  },
  'cryomancer': {
    name: '❄️ 冰法',
    hp: 90,
    damage: 13,
    speed: 6,
    defense: 0.7,
    skill: { name: '冰冻陷阱', cooldown: 6, effect: 'freeze' }
  },
  'thundermage': {
    name: '⚡ 雷电',
    hp: 85,
    damage: 22,
    speed: 7,
    defense: 0.5,
    skill: { name: '链式闪电', cooldown: 5, damage: 15 }
  },
  'assassin': {
    name: '🗡️ 刺客',
    hp: 70,
    damage: 21,
    speed: 10,
    defense: 0.4,
    skill: { name: '影分身', cooldown: 6, effect: 'dodge' }
  },
  'druid': {
    name: '🌿 自然',
    hp: 110,
    damage: 11,
    speed: 5,
    defense: 0.9,
    skill: { name: '生命之泉', cooldown: 7, heal: 30 }
  },
  'beast': {
    name: '👹 怪兽',
    hp: 120,
    damage: 14,
    speed: 6,
    defense: 1.0,
    skill: { name: '狂暴', cooldown: 6, effect: 'berserk' }
  }
};

// ========== 游戏变量 ==========
let gameState = {
  playerName: '',
  selectedHero: 'swordsman',
  playerNumber: 0,
  roomId: '',
  myHP: 100,
  oppoHP: 100,
  mySkillCD: 0,
  oppoSkillCD: 0,
  gameActive: false,
  stopGame: false
};

const heroKeys = Object.keys(HEROES);

// ========== 工具函数 ==========
function el(id) { return document.getElementById(id); }
function show(screenName) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  el(screenName).classList.add('active');
}

function genRoomId() {
  return Math.random().toString(36).substr(2, 9) + '_' + Date.now();
}

// ========== 初始化英雄选择 ==========
function initHeroes() {
  const heroList = el('heroList');
  heroKeys.forEach(key => {
    const hero = HEROES[key];
    const card = document.createElement('button');
    card.className = 'hero-btn';
    card.id = 'hero_' + key;
    card.innerHTML = `
      <div class="hero-emoji">${hero.name.charAt(0)}</div>
      <div style="font-weight: bold;">${hero.name}</div>
      <div style="font-size: 12px; opacity: 0.9;">HP: ${hero.hp} 攻: ${hero.damage}</div>
      <div style="font-size: 11px; opacity: 0.8;">${hero.skill.name}</div>
    `;
    card.onclick = () => selectHero(key);
    heroList.appendChild(card);
  });
  selectHero('swordsman');
}

function selectHero(heroKey) {
  gameState.selectedHero = heroKey;
  document.querySelectorAll('.hero-btn').forEach(btn => btn.classList.remove('selected'));
  el('hero_' + heroKey).classList.add('selected');
  el('joinBtn').disabled = !el('playerName').value.trim();
}

el('playerName').addEventListener('input', () => {
  el('joinBtn').disabled = !el('playerName').value.trim() || !gameState.selectedHero;
});

// ========== 加入游戏 ==========
async function joinGame() {
  gameState.playerName = el('playerName').value.trim();
  if (!gameState.playerName) {
    alert('请输入昵称！');
    return;
  }
  
  show('waiting');
  
  // 尝试加入队列或创建房间
  const queueRef = db.ref('matchmaking/queue');
  
  try {
    const snapshot = await queueRef.transaction(queue => {
      if (!queue) queue = [];
      
      if (queue.length > 0) {
        // 有人等待，加入对战
        gameState.roomId = queue[0].roomId;
        gameState.playerNumber = 2;
        return queue.slice(1);
      } else {
        // 没人等待，创建房间
        gameState.roomId = genRoomId();
        gameState.playerNumber = 1;
        return [...queue, { roomId: gameState.roomId, playerName: gameState.playerName }];
      }
    });
    
    if (gameState.playerNumber === 1) {
      // 玩家1等待玩家2加入
      waitForOpponent();
    } else {
      // 玩家2立即开始游戏
      startGame();
    }
  } catch (error) {
    console.error('配对失败:', error);
    alert('连接失败，请重试');
    show('lobby');
  }
}

function waitForOpponent() {
  const roomRef = db.ref('rooms/' + gameState.roomId);
  const timeout = setTimeout(() => {
    alert('等待超时，请重试');
    cancelQueue();
  }, 30000);
  
  roomRef.on('value', snapshot => {
    if (snapshot.exists() && snapshot.val().player2) {
      clearTimeout(timeout);
      roomRef.off();
      startGame();
    }
  });
}

function cancelQueue() {
  const queueRef = db.ref('matchmaking/queue');
  queueRef.once('value', snapshot => {
    const queue = snapshot.val() || [];
    const filtered = queue.filter(item => item.roomId !== gameState.roomId);
    queueRef.set(filtered);
  });
  show('lobby');
}

// ========== 游戏核心 ==========
function startGame() {
  show('battle');
  gameState.gameActive = true;
  gameState.stopGame = false;
  
  const selectedHero = HEROES[gameState.selectedHero];
  gameState.myHP = selectedHero.hp;
  gameState.oppoHP = selectedHero.hp;
  gameState.mySkillCD = 0;
  gameState.oppoSkillCD = 0;
  
  const roomRef = db.ref('rooms/' + gameState.roomId);
  
  if (gameState.playerNumber === 1) {
    // 玩家1初始化房间
    roomRef.set({
      roomId: gameState.roomId,
      player1: {
        name: gameState.playerName,
        hero: gameState.selectedHero,
        hp: gameState.myHP,
        x: 100,
        attacking: false
      },
      player2: {
        name: '等待中...',
        hero: 'swordsman',
        hp: 100,
        x: 800,
        attacking: false
      },
      gameStarted: false
    });
    
    // 等待玩家2加入
    roomRef.once('value', snap => {
      if (snap.val().player2.name !== '等待中...') {
        roomRef.update({ gameStarted: true });
        gameLoop();
      }
    });
  } else {
    // 玩家2加入房间
    roomRef.update({
      player2: {
        name: gameState.playerName,
        hero: gameState.selectedHero,
        hp: gameState.myHP,
        x: 800,
        attacking: false
      }
    });
    
    setTimeout(() => gameLoop(), 1000);
  }
  
  // 监听游戏数据
  roomRef.on('value', onGameUpdate);
  
  // 键盘控制
  document.onkeydown = handleKeyDown;
  document.onkeyup = handleKeyUp;
}

let keys = {};
function handleKeyDown(e) {
  keys[e.key] = true;
  
  if (gameState.stopGame) return;
  
  if (e.key === ' ') {
    e.preventDefault();
    // 攻击
  }
  if (e.key === 'Control') {
    e.preventDefault();
    // 技能
  }
}

function handleKeyUp(e) {
  keys[e.key] = false;
}

function onGameUpdate(snapshot) {
  if (!snapshot.exists()) return;
  
  const data = snapshot.val();
  const opponent = gameState.playerNumber === 1 ? data.player2 : data.player1;
  
  if (opponent) {
    gameState.oppoHP = opponent.hp;
    el('player2Name').textContent = opponent.name + ' (' + HEROES[opponent.hero].name + ')';
    el('hp2').textContent = Math.max(0, Math.floor(opponent.hp));
    el('health2').style.width = (Math.max(0, opponent.hp) / HEROES[opponent.hero].hp * 100) + '%';
  }
}

function gameLoop() {
  if (gameState.stopGame) return;
  
  // 更新UI
  el('player1Name').textContent = gameState.playerName + ' (' + HEROES[gameState.selectedHero].name + ')';
  el('hp1').textContent = Math.max(0, Math.floor(gameState.myHP));
  el('health1').style.width = (Math.max(0, gameState.myHP) / HEROES[gameState.selectedHero].hp * 100) + '%';
  
  // 技能冷却
  if (gameState.mySkillCD > 0) {
    gameState.mySkillCD -= 0.016;
    el('skill1').className = 'skill-cd';
    el('skill1').textContent = '技能冷却: ' + Math.ceil(gameState.mySkillCD) + 's';
  } else {
    el('skill1').className = 'skill-ready';
    el('skill1').textContent = '✓ 技能就绪';
  }
  
  if (gameState.oppoSkillCD > 0) {
    gameState.oppoSkillCD -= 0.016;
    el('skill2').className = 'skill-cd';
    el('skill2').textContent = '冷却中...';
  } else {
    el('skill2').className = 'skill-ready';
    el('skill2').textContent = '⚠ 对方技能就绪';
  }
  
  // 绘制游戏
  drawGame();
  
  // 检查输赢
  if (gameState.myHP <= 0) {
    endGame(false);
  } else if (gameState.oppoHP <= 0) {
    endGame(true);
  } else {
    requestAnimationFrame(gameLoop);
  }
}

const canvas = el('battle-canvas');
const ctx = canvas.getContext('2d');

function drawGame() {
  ctx.fillStyle = '#ecf0f1';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // 地面
  ctx.fillStyle = '#bdc3c7';
  ctx.fillRect(0, 400, canvas.width, 100);
  
  // 玩家1
  ctx.fillStyle = '#3498db';
  ctx.fillRect(100, 350, 60, 80);
  ctx.font = '40px Arial';
  ctx.fillStyle = '#333';
  ctx.fillText(HEROES[gameState.selectedHero].name.charAt(0), 115, 400);
  
  // 玩家2
  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(canvas.width - 160, 350, 60, 80);
  ctx.fillText('O', canvas.width - 145, 400);
  
  // 提示
  ctx.font = '16px Arial';
  ctx.fillStyle = '#333';
  ctx.fillText('← → 移动 | ↑ 跳跃 | 空格 攻击 | Ctrl 技能', 20, 50);
}

function endGame(isWin) {
  gameState.stopGame = true;
  document.onkeydown = null;
  document.onkeyup = null;
  
  db.ref('rooms/' + gameState.roomId).remove();
  
  el('resultTitle').textContent = isWin ? '🎉 你赢了！' : '😔 你输了';
  el('resultDetail').innerHTML = `<b>${gameState.playerName}</b> (${HEROES[gameState.selectedHero].name}) vs <b>对手</b><br>剩余血量: ${Math.floor(gameState.myHP)} - ${Math.floor(gameState.oppoHP)}`;
  show('result');
}

function surrender() {
  endGame(false);
}

// 初始化
initHeroes();
</script>

</body>
</html>
