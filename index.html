<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>⚔️ 质变版1v1格斗</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>
body{margin:0;background:#111;color:#fff;font-family:Arial;text-align:center}
canvas{background:linear-gradient(#87ceeb,#e0f6ff);display:block;margin:20px auto;border:4px solid #000}
input,button{padding:10px;margin:10px}
</style>
</head>

<body>

<h2>⚔️ 质变版1v1格斗（连招+技能+击退）</h2>
<input id="name" placeholder="输入昵称">
<button onclick="join()">开始匹配</button>

<canvas id="c" width="900" height="450"></canvas>

<script>
const firebaseConfig={
  apiKey:"AIzaSyClPWDNsJXUerSS6YGfMsir1H3KAut1gtE",
  databaseURL:"https://game-d7e6d-default-rtdb.firebaseio.com",
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let G={
 x:150,x2:750,
 y:300,y2:300,
 hp:100,hp2:100,
 keys:{},
 rid:null,
 num:0,
 atkcd:0,
 skillcd:0,
 combo:0,
 effects:[]
};

function join(){
 const name=document.getElementById('name').value;
 if(!name) return alert('输入名字');

 db.ref('queue').once('value',snap=>{
  let q=snap.val()||[];

  if(q.length>0){
    G.rid=q[0].rid;
    G.num=2;
    db.ref('rooms/'+G.rid+'/p2').set({x:750,y:300});
    db.ref('queue').set([]);
    start();
  }else{
    G.rid='r'+Math.random();
    G.num=1;
    db.ref('rooms/'+G.rid).set({p1:{x:150,y:300}});
    db.ref('queue').set([{rid:G.rid}]);

    const t=setInterval(()=>{
      db.ref('rooms/'+G.rid).once('value',s=>{
        if(s.val().p2){
          clearInterval(t);
          start();
        }
      });
    },500);
  }
 });
}

function start(){
 document.onkeydown=e=>{
  G.keys[e.key]=true;
  if(e.key===' ') atk();
  if(e.key==='Control') skill();
 };
 document.onkeyup=e=>G.keys[e.key]=false;

 db.ref('rooms/'+G.rid+'/events').on('child_added',s=>{
  const e=s.val();
  if(e.from!==G.num){
    if(e.type==='atk'){
      G.hp-=e.dmg;
      knockback(false);
    }
    if(e.type==='skill'){
      G.hp-=e.dmg;
      G.effects.push({x:G.x,y:G.y-50,t:'💥',l:30});
    }
  }
 });

 loop();
}

function atk(){
 if(G.atkcd>0) return;
 G.atkcd=15;

 G.combo=(G.combo+1)%3;

 if(Math.abs(G.x-G.x2)<90){
   let dmg=10+G.combo*3;

   db.ref('rooms/'+G.rid+'/events').push({
     type:'atk',
     from:G.num,
     dmg:dmg
   });

   G.hp2-=dmg;
   knockback(true);
 }
}

function skill(){
 if(G.skillcd>0) return;
 G.skillcd=120;

 if(Math.abs(G.x-G.x2)<150){
   db.ref('rooms/'+G.rid+'/events').push({
     type:'skill',
     from:G.num,
     dmg:20
   });

   G.hp2-=20;
   G.effects.push({x:G.x2,y:G.y2-60,t:'🔥',l:40});
 }
}

function knockback(me){
 if(me){
   G.x2 += (G.x2>G.x?30:-30);
 }else{
   G.x += (G.x>G.x2?30:-30);
 }
}

function loop(){

 if(G.keys['ArrowLeft']) G.x-=5;
 if(G.keys['ArrowRight']) G.x+=5;

 G.x=Math.max(50,Math.min(400,G.x));

 if(G.atkcd>0) G.atkcd--;
 if(G.skillcd>0) G.skillcd--;

 G.effects=G.effects.filter(e=>(e.l--,e.l>0));

 db.ref('rooms/'+G.rid+'/p'+G.num).update({
   x:G.x
 });

 db.ref('rooms/'+G.rid).once('value',s=>{
  let d=s.val();
  let opp=G.num===1?d.p2:d.p1;
  if(opp) G.x2=opp.x;
 });

 draw();

 requestAnimationFrame(loop);
}

function draw(){
 let ctx=c.getContext('2d');
 ctx.clearRect(0,0,900,450);

 ctx.fillStyle='green';
 ctx.fillRect(0,370,900,80);

 drawChar(G.x,300,'blue');
 drawChar(G.x2,300,'red');

 G.effects.forEach(e=>{
  ctx.font='40px Arial';
  ctx.fillText(e.t,e.x,e.y);
 });

 ctx.fillText('HP:'+Math.floor(G.hp),20,20);
 ctx.fillText('HP:'+Math.floor(G.hp2),780,20);
}

function drawChar(x,y,color){
 let ctx=c.getContext('2d');
 ctx.fillStyle=color;
 ctx.fillRect(x-25,y-25,50,50);
}
</script>

</body>
</html>
